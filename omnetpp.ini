[General]
network = HopCountNet
sim-time-limit = 100s

# How many packets the Sender will generate
**.sender.numPackets = 50

# Output files
output-scalar-file = results/HopCount-${configname}.sca
output-vector-file = results/HopCount-${configname}.vec

cmdenv-express-mode = false

# ── 6 Runs with different seeds ──────────────────────────────────────────────

[Config Run1]
description = "Seed 42"
seed-set = 42

[Config Run2]
description = "Seed 100"
seed-set = 100

[Config Run3]
description = "Seed 255"
seed-set = 255

[Config Run4]
description = "Seed 777"
seed-set = 777

[Config Run5]
description = "Seed 1234"
seed-set = 1234

[Config Run6]
description = "Seed 9999"
seed-set = 9999
